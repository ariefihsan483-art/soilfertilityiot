<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Farming - pH Monitor</title>
    <link href="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css)" rel="stylesheet">
    <script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/chart.js)"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-leaf"></i>
            <span>SoilFertility</span>
        </div>
        <div class="nav-links">
            <a href="#dashboard">Dashboard</a>
            <a href="#input">Input Data</a>
            <a href="#history">Riwayat</a>
        </div>
    </nav>

    <main class="container">
        <!-- Status Cards -->
        <section id="dashboard" class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon ph-icon">
                    <i class="fas fa-flask"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-label">pH Terakhir</span>
                    <span class="stat-value" id="currentPH">--</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon avg-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-label">Rata-rata (30 hari)</span>
                    <span class="stat-value" id="avgPH">--</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon status-icon">
                    <i class="fas fa-seedling"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-label">Status Tanah</span>
                    <span class="stat-value" id="soilStatus">--</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon total-icon">
                    <i class="fas fa-database"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-label">Total Pengukuran</span>
                    <span class="stat-value" id="totalReadings">--</span>
                </div>
            </div>
        </section>

        <!-- pH Gauge & Chart -->
        <section class="main-content">
            <div class="chart-container">
                <h3><i class="fas fa-chart-area"></i> Grafik pH (7 Hari Terakhir)</h3>
                <canvas id="phChart"></canvas>
            </div>
            
            <div class="gauge-container">
                <h3><i class="fas fa-tachometer-alt"></i> pH Meter</h3>
                <div class="gauge">
                    <div class="gauge-body">
                        <div class="gauge-fill" id="gaugeFill"></div>
                        <div class="gauge-cover">
                            <span id="gaugeValue">--</span>
                        </div>
                    </div>
                </div>
                <div class="ph-scale">
                    <span>0</span><span>7</span><span>14</span>
                </div>
            </div>
        </section>

        <!-- Input Form -->
        <section id="input" class="input-section">
            <h3><i class="fas fa-plus-circle"></i> Input Data pH Manual</h3>
            <form id="phForm" class="ph-form">
                <div class="form-group">
                    <label>Nilai pH</label>
                    <input type="number" id="phValue" step="0.01" min="0" max="14" required placeholder="Contoh: 6.5">
                </div>
                <div class="form-group">
                    <label>Lokasi</label>
                    <select id="location">
                        <option value="Lahan A - Utara">Lahan A - Utara</option>
                        <option value="Lahan A - Selatan">Lahan A - Selatan</option>
                        <option value="Lahan B - Timur">Lahan B - Timur</option>
                        <option value="Lahan B - Barat">Lahan B - Barat</option>
                        <option value="Greenhouse 1">Greenhouse 1</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Catatan</label>
                    <textarea id="notes" placeholder="Catatan tambahan..."></textarea>
                </div>
                <button type="submit" class="btn-submit">
                    <i class="fas fa-save"></i> Simpan Data
                </button>
            </form>
            
            <!-- Recommendation Box -->
            <div id="recommendation" class="recommendation-box" style="display:none;">
                <h4><i class="fas fa-lightbulb"></i> Rekomendasi</h4>
                <p id="recText"></p>
                <p><strong>Tanaman Cocok:</strong> <span id="recCrops"></span></p>
            </div>
        </section>

        <!-- History Table -->
        <section id="history" class="history-section">
            <h3><i class="fas fa-history"></i> Riwayat Pengukuran</h3>
            <div class="table-container">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>pH</th>
                            <th>Lokasi</th>
                            <th>Status</th>
                            <th>Catatan</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
